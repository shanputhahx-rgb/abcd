<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP GAMER</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

/* ================= BACKGROUND ================= */
canvas{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-1;
    background: radial-gradient(circle at center, #05060a 0%, #000000 65%);
}

/* glow layer (dynamic via JS) */
body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: radial-gradient(circle at 30% 20%, rgba(0,255,200,0.08), transparent 40%),
                radial-gradient(circle at 70% 80%, rgba(160,0,255,0.06), transparent 45%);
    z-index:-1;
}

/* ================= COLOR BUTTONS ================= */
#themeBox{
    position:fixed;
    top:15px;
    right:15px;
    display:flex;
    gap:8px;
    z-index:10000;
}

.btnTheme{
    width:22px;
    height:22px;
    border-radius:50%;
    cursor:pointer;
    border:2px solid white;
    box-shadow:0 0 10px rgba(255,255,255,0.2);
}

/* ================= INTRO ================= */
#intro{
    position:fixed;
    width:100%;
    height:100vh;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:9999;
}

.intro-logo{
    width:120px;
    height:120px;
    border-radius:50%;
    border:3px solid var(--main);
    box-shadow:0 0 25px var(--main);
}

.intro-text{
    color:var(--main);
    margin-top:15px;
    letter-spacing:3px;
    text-shadow:0 0 10px var(--main);
}

/* ================= MAIN ================= */
body{
    background:#000;
    overflow:hidden;

    /* DEFAULT THEME */
    --main:#00ffc8;
}

.container{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    perspective:1000px;
}

.card{
    width:320px;
    padding:20px;
    border-radius:20px;
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(12px);
    text-align:center;
    color:white;
    border:1px solid var(--main);
    box-shadow:0 0 25px var(--main);
}

.logo{
    width:110px;
    height:110px;
    border-radius:50%;
    border:3px solid var(--main);
    box-shadow:0 0 18px var(--main);
    margin-bottom:10px;
}

h1{
    color:var(--main);
    text-shadow:0 0 10px var(--main);
}

p{margin:6px 0;}
</style>
</head>

<body>

<!-- ================= COLOR SWITCH ================= -->
<div id="themeBox">
    <div class="btnTheme" style="background:#00ffc8" onclick="setTheme('#00ffc8')"></div>
    <div class="btnTheme" style="background:#ff0033" onclick="setTheme('#ff0033')"></div>
    <div class="btnTheme" style="background:#a000ff" onclick="setTheme('#a000ff')"></div>
    <div class="btnTheme" style="background:#00aaff" onclick="setTheme('#00aaff')"></div>
</div>

<!-- ================= CANVAS ================= -->
<canvas id="bg"></canvas>

<!-- ================= INTRO ================= -->
<div id="intro">
    <img class="intro-logo" src="https://i.imgur.com/2DhmtJ4.png">
    <div class="intro-text">VIP GAMER LOADING...</div>
</div>

<!-- ================= PROFILE ================= -->
<div class="container">
    <div class="card" id="card">

        <img class="logo" src="https://i.imgur.com/2DhmtJ4.png">

        <h1>SADEE VIP</h1>

        <p>👑 Owner: SADEE | Elite Gamer</p>
        <p>🎮 Status: Grinding Skills 🔥</p>
        <p>📍 Base: Sri Lanka Server 🇱🇰</p>

    </div>
</div>

<script>

/* ================= THEME SWITCH ================= */
function setTheme(color){
    document.documentElement.style.setProperty("--main", color);
}

/* ================= INTRO ================= */
setTimeout(()=>{
    document.getElementById("intro").style.display="none";
},3000);

/* ================= CARD 3D ================= */
const card=document.getElementById("card");

document.addEventListener("mousemove",(e)=>{
    let x=(window.innerWidth/2-e.pageX)/25;
    let y=(window.innerHeight/2-e.pageY)/25;
    card.style.transform=`rotateY(${x}deg) rotateX(${y}deg)`;
});

/* ================= LIGHTNING ================= */
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

function resize(){
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
}
resize();

let bolts=[];

function createBolt(){
    return {
        x:Math.random()*canvas.width,
        y:0,
        len:Math.random()*180+120,
        speed:Math.random()*3+2
    };
}

for(let i=0;i<18;i++){
    bolts.push(createBolt());
}

function draw(){
    ctx.fillStyle="rgba(0,0,0,0.28)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    for(let b of bolts){

        ctx.strokeStyle=getComputedStyle(document.documentElement)
            .getPropertyValue("--main");

        ctx.shadowBlur=25;
        ctx.shadowColor=getComputedStyle(document.documentElement)
            .getPropertyValue("--main");

        ctx.beginPath();
        ctx.moveTo(b.x,b.y);
        ctx.lineTo(b.x,b.y+b.len);
        ctx.stroke();

        b.y += b.speed;

        if(b.y > canvas.height){
            b.y = 0;
            b.x = Math.random()*canvas.width;
        }
    }

    requestAnimationFrame(draw);
}

draw();

window.addEventListener("resize",resize);

</script>

</body>
</html>
